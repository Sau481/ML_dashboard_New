<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ML Practical Dashboard — Upload</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <h1>ML Practical Dashboard</h1>
    <p>Upload a CSV file to analyze (classification or regression)</p>
    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept=".csv">
      <button type="submit">Upload</button>
    </form>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for msg in messages %}
          <li style="color:red">{{ msg }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
  </body>
</html>
